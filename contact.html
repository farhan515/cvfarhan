<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me - CV</title>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f7fa;
            color: #333;
        }

        #content {
            padding: 25px;
            margin: 20px auto;
            border-radius: 12px;
            background: #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            max-width: 600px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .card {
            background: #f9f9f9;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.08);
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 16px;
            box-sizing: border-box;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #007BFF;
            box-shadow: 0 0 5px rgba(0,123,255,0.3);
        }

        button {
            padding: 12px 25px;
            background: #007BFF;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #0056b3;
        }

        .error {
            color: red;
            font-size: 14px;
            display: none;
            margin-top: 3px;
        }

        .history {
            margin-top: 20px;
        }

        .history h3 {
            margin-bottom: 10px;
            color: #007BFF;
        }

        .history-item {
            background: #e9f0ff;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .history-item strong {
            display: block;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

<div id="content">
    <h2>Contact Me</h2>

    <div class="card">
        <form id="contactForm">
            <div class="form-group">
                <label for="name">Nama:</label>
                <input type="text" id="name" name="name">
                <small class="error"></small>
            </div>

            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email">
                <small class="error"></small>
            </div>

            <div class="form-group">
                <label for="message">Pesan:</label>
                <textarea id="message" name="message" rows="5"></textarea>
                <small class="error"></small>
            </div>

            <button type="submit">Kirim</button>
        </form>
    </div>

    <div class="history card">
        <h3>Riwayat Pesan</h3>
        <div id="historyList">
            <!-- Pesan tersimpan akan muncul di sini -->
        </div>
    </div>
</div>

<script>
$(document).ready(function(){

    // Fungsi tampilkan riwayat pesan
    function showHistory(){
        let history = JSON.parse(localStorage.getItem("contact_history") || "[]");
        let html = "";
        if(history.length === 0){
            html = "<p>Belum ada pesan yang dikirim.</p>";
        } else {
            history.forEach(function(item, index){
                html += `<div class="history-item">
                            <strong>${item.name} (${item.email})</strong>
                            <p>${item.message}</p>
                         </div>`;
            });
        }
        $("#historyList").html(html);
    }

    // Load data terakhir untuk form
    if(localStorage.getItem("contact_name")){
        $("#name").val(localStorage.getItem("contact_name"));
    }
    if(localStorage.getItem("contact_email")){
        $("#email").val(localStorage.getItem("contact_email"));
    }
    if(localStorage.getItem("contact_message")){
        $("#message").val(localStorage.getItem("contact_message"));
    }

    // Tampilkan riwayat
    showHistory();

    // Validasi & submit
    $("#contactForm").submit(function(e){
        e.preventDefault();
        $(".error").text("").hide();

        let valid = true;
        let name = $("#name").val().trim();
        let email = $("#email").val().trim();
        let message = $("#message").val().trim();

        if(name === ""){
            $("#name").next(".error").text("Nama wajib diisi").show();
            valid = false;
        }

        let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,}$/i;
        if(email === ""){
            $("#email").next(".error").text("Email wajib diisi").show();
            valid = false;
        } else if(!emailPattern.test(email)){
            $("#email").next(".error").text("Format email tidak valid").show();
            valid = false;
        }

        if(message === ""){
            $("#message").next(".error").text("Pesan wajib diisi").show();
            valid = false;
        } else if(message.length < 10){
            $("#message").next(".error").text("Pesan minimal 10 karakter").show();
            valid = false;
        }

        if(valid){
            // Simpan form terakhir
            localStorage.setItem("contact_name", name);
            localStorage.setItem("contact_email", email);
            localStorage.setItem("contact_message", message);

            // Simpan ke riwayat
            let history = JSON.parse(localStorage.getItem("contact_history") || "[]");
            history.push({name, email, message});
            localStorage.setItem("contact_history", JSON.stringify(history));

            alert("Pesan berhasil dikirim! Terima kasih, " + name);

            // Reset form
            $("#message").val("");
            
            // Update riwayat
            showHistory();
        }
    });

    $("#name, #email, #message").on("input", function(){
        $(this).next(".error").text("").hide();
    });

});
</script>

</body>
</html>
